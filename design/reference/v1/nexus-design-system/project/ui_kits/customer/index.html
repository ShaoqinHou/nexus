<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Nexus · Customer Ordering</title>
  <link rel="stylesheet" href="../shared/nexus.css" />
  <style>body { height: 100vh; overflow: hidden; }</style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" style="height:100vh"></div>
  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel">
    const { useState } = React;
    const { MENU, CategoryRail, FeaturedStrip, MenuItemCard, CartSidebar, FloatingActions } = window.CustomerParts;

    function App() {
      const [active, setActive] = useState('noodles');
      const [cart, setCart] = useState({ n1: 1, m1: 2 });

      const inc = (item) => setCart(c => ({ ...c, [item.id]: (c[item.id] || 0) + 1 }));
      const dec = (item) => setCart(c => {
        const n = (c[item.id] || 0) - 1;
        const next = { ...c }; if (n <= 0) delete next[item.id]; else next[item.id] = n;
        return next;
      });

      return (
        <div style={{ display: 'flex', height: '100vh', background: 'var(--color-bg)', fontFamily: 'var(--font-sans)', position: 'relative' }}>
          <CategoryRail active={active} onSelect={setActive} />
          <main style={{ flex: 1, overflowY: 'auto', minWidth: 0 }}>
            <FeaturedStrip onAdd={inc} />
            <div style={{ padding: '16px', display: 'flex', flexDirection: 'column', gap: 32 }}>
              {MENU.map(cat => (
                <section key={cat.id} id={`cat-${cat.id}`}>
                  <h2 style={{ margin: '0 0 10px', fontSize: 16, fontWeight: 700, color: 'var(--color-text)' }}>{cat.name}</h2>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: 12 }}>
                    {cat.items.map(item => <MenuItemCard key={item.id} item={item} qty={cart[item.id] || 0} onAdd={inc} onDec={dec} />)}
                  </div>
                </section>
              ))}
            </div>
          </main>
          <CartSidebar cart={cart} onInc={inc} onDec={dec}
            onClear={() => setCart({})}
            onPlace={() => { alert('Order placed! (demo)'); setCart({}); }} />
          <FloatingActions />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
