<!doctype html><html><head><meta charset="utf-8"><title>Text roles</title><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <p class="eyebrow">Text color roles</p>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="color:var(--color-text);font-size:14px;font-weight:500">Primary text · gray-900</span><span class="swatch-val">#111827</span></div>
    <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="color:var(--color-text-secondary);font-size:14px">Secondary text · gray-500</span><span class="swatch-val">#6b7280</span></div>
    <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="color:var(--color-text-tertiary);font-size:14px">Tertiary text · gray-400</span><span class="swatch-val">#9ca3af</span></div>
    <div style="display:flex;justify-content:space-between;align-items:baseline;background:var(--color-primary);padding:6px 10px;border-radius:6px"><span style="color:var(--color-text-inverse);font-size:14px;font-weight:500">Inverse on primary · white</span><span style="font-family:var(--font-mono);font-size:10px;color:#dbeafe">#ffffff</span></div>
  </div>
</div></body></html>
