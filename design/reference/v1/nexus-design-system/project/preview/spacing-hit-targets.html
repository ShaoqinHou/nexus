<!doctype html><html><head><meta charset="utf-8"><title>Hit targets & spacing</title><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <p class="eyebrow">Hit targets · enforced min-heights</p>
  <div style="display:flex;align-items:flex-end;gap:14px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="height:44px;width:90px;border:1px dashed var(--color-border-strong);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--color-text-secondary)">44 sm</div>
      <span class="swatch-val">secondary / icon</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="height:48px;width:100px;background:var(--color-primary);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500">48 md</div>
      <span class="swatch-val">primary</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div style="height:52px;width:110px;background:var(--color-primary);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500">52 lg</div>
      <span class="swatch-val">main CTA</span>
    </div>
    <div style="flex:1;padding-left:16px;border-left:1px solid var(--color-border)">
      <div class="eyebrow" style="margin-bottom:6px">Spacing rhythm</div>
      <div style="font-size:12px;color:var(--color-text-secondary);line-height:1.6">
        4px base · gap-2/3 inline · gap-6/8 between cards<br>
        Card padding: px-4 sm:px-6 py-4<br>
        Forms: space-y-4 between fields, gap-1.5 label→input
      </div>
    </div>
  </div>
</div></body></html>
