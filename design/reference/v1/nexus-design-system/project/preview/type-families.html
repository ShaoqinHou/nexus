<!doctype html><html><head><meta charset="utf-8"><title>Type families</title><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <p class="eyebrow">Type families</p>
  <div style="display:flex;flex-direction:column;gap:14px">
    <div>
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px">--font-sans · Inter · 100–900</div>
      <div style="font-family:var(--font-sans);font-size:22px;font-weight:600">Nexus · The quick brown fox jumps</div>
      <div style="font-family:var(--font-sans);font-size:13px;color:var(--color-text-secondary)">AaBbCc 0123456789 — used for all UI chrome and body copy</div>
    </div>
    <div>
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px">--font-mono · JetBrains Mono</div>
      <div style="font-family:var(--font-mono);font-size:18px">#A3F4C2 · demo@example.com · /demo-restaurant</div>
      <div style="font-family:var(--font-mono);font-size:12px;color:var(--color-text-secondary)">IDs · slugs · order codes · any technical string</div>
    </div>
  </div>
</div></body></html>
