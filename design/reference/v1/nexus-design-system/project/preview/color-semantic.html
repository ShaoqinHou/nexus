<!doctype html><html><head><meta charset="utf-8"><title>Semantic colors</title><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <p class="eyebrow">Semantic · solid + light companion</p>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
    <div class="col">
      <div style="background:#dcfce7;color:#16a34a;padding:8px 10px;border-radius:6px;font-size:12px;font-weight:600">Success</div>
      <div class="swatch-val">#16a34a · #dcfce7</div>
    </div>
    <div class="col">
      <div style="background:#fef3c7;color:#d97706;padding:8px 10px;border-radius:6px;font-size:12px;font-weight:600">Warning</div>
      <div class="swatch-val">#d97706 · #fef3c7</div>
    </div>
    <div class="col">
      <div style="background:#fee2e2;color:#dc2626;padding:8px 10px;border-radius:6px;font-size:12px;font-weight:600">Danger</div>
      <div class="swatch-val">#dc2626 · #fee2e2</div>
    </div>
    <div class="col">
      <div style="background:#dbeafe;color:#2563eb;padding:8px 10px;border-radius:6px;font-size:12px;font-weight:600">Info</div>
      <div class="swatch-val">#2563eb · #dbeafe</div>
    </div>
    <div class="col">
      <div style="background:#f3f4f6;color:#6b7280;padding:8px 10px;border-radius:6px;font-size:12px;font-weight:600">Default</div>
      <div class="swatch-val">#6b7280 · #f3f4f6</div>
    </div>
    <div class="col">
      <div style="background:#dc2626;color:#fff;padding:8px 10px;border-radius:6px;font-size:12px;font-weight:600">Danger solid</div>
      <div class="swatch-val">hover → #b91c1c</div>
    </div>
  </div>
</div></body></html>
