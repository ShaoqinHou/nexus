<!doctype html><html><head><meta charset="utf-8"><title>Card</title><link rel="stylesheet" href="_base.css"></head>
<body style="background:#f9fafb"><div class="card" style="background:#f9fafb">
  <p class="eyebrow">Card · header / content / footer</p>
  <div style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;box-shadow:0 1px 2px 0 rgb(0 0 0 / .05);overflow:hidden">
    <div style="padding:14px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center">
      <h3 style="margin:0;font-size:16px;font-weight:600;color:#111827">Order #AB3F2C</h3>
      <span style="background:#fef3c7;color:#d97706;padding:2px 10px;border-radius:9999px;font-size:12px;font-weight:500">Preparing</span>
    </div>
    <div style="padding:14px 20px;font-size:13px;color:#6b7280;line-height:1.5">
      2× Dan Dan Noodles · 1× Mapo Tofu · Table 5<br>
      Placed 4 minutes ago
    </div>
    <div style="padding:10px 20px;border-top:1px solid #e5e7eb;display:flex;justify-content:flex-end;gap:8px">
      <button style="background:transparent;color:#111827;border:none;font-size:13px;font-weight:500;padding:6px 10px;cursor:pointer">View</button>
      <button style="background:#2563eb;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer">Mark ready</button>
    </div>
  </div>
</div></body></html>
