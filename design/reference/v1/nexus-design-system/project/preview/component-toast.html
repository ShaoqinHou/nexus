<!doctype html><html><head><meta charset="utf-8"><title>Toast</title><link rel="stylesheet" href="_base.css">
<style>.tst{display:flex;align-items:center;gap:12px;padding:12px 14px;min-height:52px;border-radius:8px;border:1px solid;font-size:14px;font-weight:500;box-shadow:0 4px 6px -1px rgb(0 0 0 / .1)}</style>
</head>
<body style="background:#f9fafb"><div class="card" style="background:#f9fafb">
  <p class="eyebrow">Toasts · bottom-right stack</p>
  <div class="col" style="gap:8px">
    <div class="tst" style="background:#dcfce7;color:#16a34a;border-color:rgba(22,163,74,.2)">✓&nbsp; Order placed successfully!</div>
    <div class="tst" style="background:#fee2e2;color:#dc2626;border-color:rgba(220,38,38,.2)">✕&nbsp; Failed to place order. Please try again.</div>
    <div class="tst" style="background:#dbeafe;color:#2563eb;border-color:rgba(37,99,235,.2)">i&nbsp; Promo code applied</div>
  </div>
</div></body></html>
