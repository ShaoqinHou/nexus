<!doctype html><html><head><meta charset="utf-8"><title>Badges</title><link rel="stylesheet" href="_base.css">
<style>.bdg{display:inline-flex;align-items:center;border-radius:9999px;padding:2px 10px;font-size:12px;font-weight:500;font-family:var(--font-sans)}</style>
</head>
<body><div class="card">
  <p class="eyebrow">Badges & StatusBadge</p>
  <div class="row">
    <span class="bdg" style="background:#f3f4f6;color:#6b7280">default</span>
    <span class="bdg" style="background:#dcfce7;color:#16a34a">success</span>
    <span class="bdg" style="background:#fef3c7;color:#d97706">warning</span>
    <span class="bdg" style="background:#fee2e2;color:#dc2626">error</span>
    <span class="bdg" style="background:#dbeafe;color:#2563eb">info</span>
  </div>
  <div class="row">
    <span class="bdg" style="background:#fef3c7;color:#d97706">Pending</span>
    <span class="bdg" style="background:#fef3c7;color:#d97706">Preparing</span>
    <span class="bdg" style="background:#dcfce7;color:#16a34a">Ready</span>
    <span class="bdg" style="background:#dcfce7;color:#16a34a">Confirmed</span>
    <span class="bdg" style="background:#fee2e2;color:#dc2626">Cancelled</span>
  </div>
  <span class="swatch-val">StatusBadge auto-maps order-status strings to variants</span>
</div></body></html>
