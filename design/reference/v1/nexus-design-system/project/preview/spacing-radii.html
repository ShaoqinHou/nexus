<!doctype html><html><head><meta charset="utf-8"><title>Radii</title><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <p class="eyebrow">Corner radii</p>
  <div class="row" style="gap:14px">
    <div class="swatch"><div class="swatch-chip" style="background:var(--color-bg-muted);border-radius:4px;height:48px"></div><div class="swatch-name">sm · 4px</div><div class="swatch-val">--radius-sm</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--color-bg-muted);border-radius:6px;height:48px"></div><div class="swatch-name">md · 6px</div><div class="swatch-val">buttons, inputs</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--color-bg-muted);border-radius:8px;height:48px"></div><div class="swatch-name">lg · 8px</div><div class="swatch-val">cards, dialogs</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--color-bg-muted);border-radius:12px;height:48px"></div><div class="swatch-name">xl · 12px</div><div class="swatch-val">--radius-xl</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:var(--color-bg-muted);border-radius:9999px;height:48px"></div><div class="swatch-name">full</div><div class="swatch-val">badges, chips</div></div>
  </div>
</div></body></html>
