<!doctype html><html><head><meta charset="utf-8"><title>Shadows</title><link rel="stylesheet" href="_base.css"></head>
<body style="background:#f9fafb"><div class="card" style="background:#f9fafb">
  <p class="eyebrow">Shadow scale · short & soft</p>
  <div class="row" style="gap:20px;align-items:stretch">
    <div class="swatch"><div style="width:100%;height:72px;background:#fff;border-radius:8px;box-shadow:0 1px 2px 0 rgb(0 0 0 / .05)"></div><div class="swatch-name">shadow-sm</div><div class="swatch-val">cards, toggle thumb</div></div>
    <div class="swatch"><div style="width:100%;height:72px;background:#fff;border-radius:8px;box-shadow:0 4px 6px -1px rgb(0 0 0 / .1)"></div><div class="swatch-name">shadow-md</div><div class="swatch-val">dialogs, toasts</div></div>
    <div class="swatch"><div style="width:100%;height:72px;background:#fff;border-radius:8px;box-shadow:0 10px 15px -3px rgb(0 0 0 / .1)"></div><div class="swatch-name">shadow-lg</div><div class="swatch-val">reserved</div></div>
  </div>
</div></body></html>
